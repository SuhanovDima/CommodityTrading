spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/commodity_trading}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
  liquibase:
    change-log: classpath:/db/changelog/master.yaml
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

server:
  port: 8090

jwt:
  secret: ${JWT_SECRET:YWRmMzQyYTAtZDc4OS00NjRiLWI5MzktMWE0YTVhNDI1MWQx}
  expiration-ms: 2592000000
  refresh-token-expiration-ms: 604800000
