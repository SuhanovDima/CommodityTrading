<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Commodity Trading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 2.5rem;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header h1 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .login-header p {
            color: #666;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .error-message {
            background: #fee;
            color: #c00;
            padding: 0.75rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        .success-message {
            background: #efe;
            color: #060;
            padding: 0.75rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        .btn-login {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .links {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Commodity Trading</h1>
            <p>Sign in to your account</p>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="Enter your username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
            </div>
            
            <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
        </form>
        
        <div class="links">
            <p>Don't have an account? <a href="#" onclick="alert('Contact administrator to create an account'); return false;">Contact admin</a></p>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        const LOGIN_ENDPOINT = '/auth/login';
        const REFRESH_ENDPOINT = '/auth/refresh';
        const LOGOUT_ENDPOINT = '/auth/logout';

        document.addEventListener('DOMContentLoaded', function() {
            checkExistingToken();
            
            const urlParams = new URLSearchParams(window.location.search);
            const logoutSuccess = urlParams.get('logout');
            if (logoutSuccess === 'true') {
                showSuccess('Logged out successfully');
            }
        });

        function checkExistingToken() {
            const token = localStorage.getItem('accessToken') || getCookie('accessToken');
            if (token) {
                window.location.href = '/ui/users';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';
            hideMessages();
            
            try {
                const response = await fetch(API_BASE + LOGIN_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.detail || errorData.message || 'Login failed');
                }
                
                const data = await response.json();
                
                localStorage.setItem('accessToken', data.accessToken);
                localStorage.setItem('refreshToken', data.refreshToken);
                localStorage.setItem('tokenType', data.tokenType);
                localStorage.setItem('username', data.username);
                localStorage.setItem('roles', JSON.stringify(data.roles));
                setCookie('accessToken', data.accessToken);
                
                showSuccess('Login successful! Redirecting...');
                
                setTimeout(() => {
                    window.location.href = '/ui/users';
                }, 1000);
                
            } catch (error) {
                showError(error.message || 'Invalid username or password');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.textContent = message;
            successEl.style.display = 'block';
        }

        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        async function refreshToken() {
            const refreshTok = localStorage.getItem('refreshToken');
            if (!refreshTok) return null;
            
            try {
                const response = await fetch(API_BASE + REFRESH_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ refreshToken: refreshTok })
                });
                
                if (!response.ok) {
                    throw new Error('Token refresh failed');
                }
                
                const data = await response.json();
                localStorage.setItem('accessToken', data.accessToken);
                localStorage.setItem('refreshToken', data.refreshToken);
                setCookie('accessToken', data.accessToken);
                return data.accessToken;
                
            } catch (error) {
                localStorage.removeItem('accessToken');
                localStorage.removeItem('refreshToken');
                clearCookie('accessToken');
                window.location.href = '/ui/login?loggedOut=true';
                return null;
            }
        }

        async function apiRequest(url, options = {}) {
            let token = localStorage.getItem('accessToken');
            
            const headers = {
                ...options.headers,
                'Content-Type': 'application/json'
            };
            
            if (token) {
                headers['Authorization'] = 'Bearer ' + token;
            }
            
            let response = await fetch(url, { ...options, headers });
            
            if (response.status === 401) {
                const newToken = await refreshToken();
                if (newToken) {
                    headers['Authorization'] = 'Bearer ' + newToken;
                    response = await fetch(url, { ...options, headers });
                }
            }
            
            if (response.status === 401) {
                window.location.href = '/ui/login?loggedOut=true';
                throw new Error('Unauthorized');
            }
            
            return response;
        }

        async function logout() {
            const token = localStorage.getItem('accessToken');
            
            try {
                await fetch(API_BASE + LOGOUT_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ token })
                });
            } catch (error) {
                console.error('Logout error:', error);
            } finally {
                localStorage.removeItem('accessToken');
                localStorage.removeItem('refreshToken');
                localStorage.removeItem('tokenType');
                localStorage.removeItem('username');
                localStorage.removeItem('roles');
                clearCookie('accessToken');
                window.location.href = '/ui/login?logout=true';
            }
        }

        function setCookie(name, value) {
            document.cookie = name + '=' + encodeURIComponent(value) + '; Path=/; SameSite=Lax';
        }

        function getCookie(name) {
            const match = document.cookie
                .split('; ')
                .find(row => row.startsWith(name + '='));
            return match ? decodeURIComponent(match.split('=')[1]) : null;
        }

        function clearCookie(name) {
            document.cookie = name + '=; Path=/; Max-Age=0; SameSite=Lax';
        }
    </script>
</body>
</html>
