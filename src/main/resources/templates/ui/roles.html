<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Roles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Roles</h1>
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/ui/users}">Users</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="card mb-4">
        <div class="card-header">Add Role</div>
        <div class="card-body">
            <form th:action="@{/ui/roles}" th:object="${roleForm}" method="post" novalidate>
                <div class="mb-3">
                    <label for="name" class="form-label">Role name</label>
                    <input id="name" type="text" class="form-control" th:field="*{name}">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <div class="text-danger small mb-3" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
                <button type="submit" class="btn btn-primary">Create Role</button>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header">Roles List</div>
        <div class="card-body p-0">
            <table class="table table-striped mb-0">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(roles)}">
                    <td colspan="2" class="text-center text-muted py-3">No roles yet</td>
                </tr>
                <tr th:each="role : ${roles}">
                    <td th:text="${role.id()}"></td>
                    <td th:text="${role.name()}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
