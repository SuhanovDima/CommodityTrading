<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Users</h1>
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/ui/roles}">Roles</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="card mb-4">
        <div class="card-header">Add User</div>
        <div class="card-body">
            <form th:action="@{/ui/users}" th:object="${userForm}" method="post" novalidate>
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input id="username" type="text" class="form-control" th:field="*{username}">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input id="password" type="password" class="form-control" th:field="*{password}">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>
                <div class="form-check mb-3">
                    <input id="enabled" class="form-check-input" type="checkbox" th:field="*{enabled}">
                    <label class="form-check-label" for="enabled">Enabled</label>
                </div>
                <div class="text-danger small mb-3" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
                <button type="submit" class="btn btn-primary">Create User</button>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header">Users List</div>
        <div class="card-body p-0">
            <table class="table table-striped mb-0">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Enabled</th>
                    <th>Roles</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="4" class="text-center text-muted py-3">No users yet</td>
                </tr>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id()}"></td>
                    <td th:text="${user.username()}"></td>
                    <td th:text="${user.enabled()} ? 'Yes' : 'No'"></td>
                    <td>
                        <span th:if="${#sets.isEmpty(user.roles())}" class="text-muted">-</span>
                        <span th:unless="${#sets.isEmpty(user.roles())}" th:text="${#strings.listJoin(user.roles().![name()], ', ')}"></span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
