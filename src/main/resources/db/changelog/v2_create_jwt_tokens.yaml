databaseChangeLog:
  - changeSet:
      id: v2-create-jwt-tokens
      author: assistant
      changes:
        - createTable:
            tableName: jwt_tokens
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: token
                  type: TEXT
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: issued_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: revoked
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: jwt_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_jwt_tokens_user
            onDelete: CASCADE
        - createIndex:
            tableName: jwt_tokens
            indexName: idx_jwt_tokens_token
            columns:
              - column:
                  name: token
        - createIndex:
            tableName: jwt_tokens
            indexName: idx_jwt_tokens_user_id
            columns:
              - column:
                  name: user_id
